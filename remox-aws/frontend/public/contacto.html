  <style>
    .nav-logo .logo-img { height: 70px; }
    body { background: #f5f7fa; }
  
    .map-section {
      padding: 260px 20px 80px;
      background: #f5f7fa;
    }
    .map-container {
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 30px;
      align-items: stretch;
    }
    @media(max-width:768px){ .map-container{ grid-template-columns:1fr; } }
    .map-info { display: flex; flex-direction: column; gap: 20px; }
    .map-info-card {
      background: white;
      padding: 22px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: 0.3s;
    }
    .map-info-card:hover { transform: translateY(-3px); }
    .map-info-card img { width: 32px; height: 32px; }
    .map-info-card p { margin: 0; font-size: 0.92rem; color: #2d3748; }
    .map-info-card a { color: inherit; text-decoration: none; }
    .map-iframe-wrap {
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
      min-height: 380px;
    }
    .map-iframe-wrap iframe {
      width: 100%; height: 100%; min-height: 380px; border: none;
    }

    .whatsapp-float {
      position: fixed; bottom: 24px; right: 24px;
      width: 56px; height: 56px; background: #25D366;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(37,211,102,0.45); z-index: 9000; transition: transform 0.2s;
    }
    .whatsapp-float:hover { transform: scale(1.1); }
    .whatsapp-float svg { width: 30px; height: 30px; fill: white; }

    .menu-toggle {
      display: none;
      font-size: 28px;
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      z-index: 10001;
    }
    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      .nav-menu {
        position: absolute;
        top: 70px;
        right: 0;
        background: #0c2c54;
        flex-direction: column;
        width: 250px;
        padding: 20px;
        display: none !important;
        z-index: 10000;
      }
      .nav-menu.active { display: flex !important; }
      .menu-item { width: 100%; margin-bottom: 15px; }
      .dropdown {
        position: relative !important;
        display: none;
        width: 100%;
        background: #ffffff;
        border-radius: 8px;
        margin-top: 8px;
        padding: 10px 0;
      }
      .dropdown p { color: #1f4e79 !important; }
      .menu-item.open .dropdown { display: block; }
    }

    html, body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    body > *:not(footer):not(nav):not(script) {
      flex-shrink: 0;
    }
    .footer {
      margin-top: auto !important;
    }
  </style>

<script>
  window.addEventListener('scroll', () =>
    document.querySelector('.navbar')?.classList.toggle('scrolled', window.scrollY > 50)
  );
</script>
<script>

  (function() {
    var toggle = document.getElementById('menu-toggle');
    var menu   = document.getElementById('nav-menu');
    if (toggle && menu) {
      toggle.addEventListener('click', function() { menu.classList.toggle('active'); });
    }
    document.querySelectorAll('.menu-item').forEach(function(item) {
      item.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
          item.classList.toggle('open');
          e.stopPropagation();
        }
      });
    });

    document.addEventListener('click', function(e) {
      if (menu && !menu.contains(e.target) && toggle && !toggle.contains(e.target)) {
        menu.classList.remove('active');
      }
    });
  })();
</script>
