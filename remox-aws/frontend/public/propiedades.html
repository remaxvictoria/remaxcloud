<!DOCTYPE html>
<html lang="es"><!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propiedades - RE/MAX Victoria Durango</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .nav-logo .logo-img { height: 70px; }

    .navbar { background: #0B2742 !important; }

    .property-grid { grid-template-columns: repeat(3, 1fr) !important; }
    @media(max-width: 1024px){ .property-grid { grid-template-columns: repeat(2, 1fr) !important; } }
    @media(max-width: 600px){ .property-grid { grid-template-columns: 1fr !important; } }

    .property-image-wrap { position: relative; }
    .op-badge {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700; color: white;
      z-index: 2; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .op-renta { background: #1f4e79; }


    .filters-section {
      background: white;
      padding: 28px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .filters-spacer {
      height: 80px;
      background: #f5f7fa;
    }
    .filters-inner {
      max-width: 1200px;
      margin: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;

    }
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;

    }
    .filter-group label {

    .filter-group select,

      color: #2d3748;
      outline: none;
      background: white;
      transition: border-color 0.2s;
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg fill='%230b2742' height='16' viewBox='0 0 20 20' width='16' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5'/></svg>");
      background-repeat: no-repeat;

    .btn-buscar {

      border: none;

    .btn-limpiar {

      border-radius: 10px;

      cursor: pointer;

    .whatsapp-float {

      color: white;

<script>
const API_BASE = '/api';
const PAGE_SIZE = 12;
const FALLBACK  = 'https://cdn.remax.com.mx/properties/default_rebrand.jpg';

let allProps    = [];
let filtered    = [];
let currentPage = 1;


window.addEventListener('scroll', () =>
  document.querySelector('.navbar')?.classList.toggle('scrolled', window.scrollY > 50)
);


function buildCard(p) {
  const opLabel = String(p.operacion) === '2' ? 'En renta' : 'En venta';
  const opClass = String(p.operacion) === '2' ? 'op-renta' : 'op-venta';
  const badgePropuesta      = (p.propuesta === '1'       || p.propuesta === 1)
    ? '<span class="status-badge status-propuesta">Propuesta</span>' : '';
  const badgeVentaPendiente = (p.venta_pendiente === '1' || p.venta_pendiente === 1)
    ? '<span class="status-badge status-proceso">En proceso de venta</span>' : '';
  return `
  <div class="property-card" onclick='goToDetail(${JSON.stringify(p)})'>
    <div class="property-image-wrap">
      <img src="${p.imagen || FALLBACK}" class="property-image" onerror="this.src='${FALLBACK}'">
      <div class="remax-badge">RE/MAX</div>
      <span class="op-badge ${opClass}">${opLabel}</span>
      ${badgePropuesta}
      ${badgeVentaPendiente}
    </div>
    <div class="property-body">
      <div class="property-title">${p.titulo || 'Propiedad'}</div>
      <div class="property-address">
        <img src="img/ubicacion.png" class="logo-img"> ${p.ubicacion || 'Durango'}
      </div>
      <div class="property-price">
        ${Number(p.precio||0).toLocaleString('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0})}
      </div>
    </div>
  </div>`;
}

function goToDetail(p) {
  const id = p?.propiedad_id || p?.id || '';
  window.location.href = id
    ? `property-detail.html?id=${encodeURIComponent(id)}`
    : 'property-detail.html';
}


function renderPage() {
  const grid  = document.getElementById('results-grid');
  const count = document.getElementById('results-count');
  const pag   = document.getElementById('pagination');

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const start      = (currentPage - 1) * PAGE_SIZE;
  const slice      = filtered.slice(start, start + PAGE_SIZE);

  count.innerHTML = filtered.length
    ? `<strong>${filtered.length}</strong> propiedades encontradas`
    : 'No se encontraron propiedades con esos filtros.';

  if (!slice.length) {
    grid.innerHTML = '<p style="padding:30px;color:#666;text-align:center;">Sin resultados.</p>';
    pag.innerHTML  = '';
    return;
  }

  grid.innerHTML = `<div class="property-grid">${slice.map(buildCard).join('')}</div>`;


  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let btns = '';
  btns += `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 2) {
      btns += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    } else if (Math.abs(i - currentPage) === 3) {
      btns += `<button disabled>…</button>`;
    }
  }
  btns += `<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pag.innerHTML = btns;
}

function goPage(n) {
  currentPage = n;
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}


function buscar() {
  const ubicacion = (document.getElementById('f-ubicacion').value || '').toLowerCase().trim();
  const precio    = document.getElementById('f-precio').value;
  const tipo      = document.getElementById('f-tipo').value;
  const operacion = document.getElementById('f-operacion').value;
  const cuartos   = document.getElementById('f-cuartos').value;
  const banos     = document.getElementById('f-banos').value;
  const estac     = document.getElementById('f-estacionamientos').value;

  const terrenoMinRaw = document.getElementById('f-terreno-min').value.trim();
  const terrenoMaxRaw = document.getElementById('f-terreno-max').value.trim();
  const constMinRaw   = document.getElementById('f-const-min').value.trim();
  const constMaxRaw   = document.getElementById('f-const-max').value.trim();

  const filtrarTerreno = terrenoMinRaw !== '' || terrenoMaxRaw !== '';
  const filtrarConst   = constMinRaw   !== '' || constMaxRaw   !== '';


  const terrenoMin = terrenoMinRaw !== '' ? Number(terrenoMinRaw) : -Infinity;
  const terrenoMax = terrenoMaxRaw !== '' ? Number(terrenoMaxRaw) :  Infinity;
  const constMin   = constMinRaw   !== '' ? Number(constMinRaw)   : -Infinity;
  const constMax   = constMaxRaw   !== '' ? Number(constMaxRaw)   :  Infinity;

  filtered = allProps.filter(p => {


    if (ubicacion && !(p.ubicacion || '').toLowerCase().includes(ubicacion)) return false;


    if (precio) {
      const v = Number(p.precio || 0);
      if (precio === '0-1' && !(v >= 0       && v < 1000000)) return false;
      if (precio === '1-2' && !(v >= 1000000 && v < 2000000)) return false;
      if (precio === '2-3' && !(v >= 2000000 && v < 3000000)) return false;
      if (precio === '3+'  && !(v >= 3000000))                 return false;
    }


    if (tipo && !(p.tipo || '').toLowerCase().includes(tipo)) return false;


    if (operacion && String(p.operacion) !== operacion) return false;


    if (cuartos) {
      const c = Math.round(Number(p.cuartos || p.recamaras || 0));
      if (!c) return false;
      if (c < Number(cuartos)) return false;
    }


    if (banos) {
      const b = Number(p.banos || 0);
      if (!b) return false;
      if (b < Number(banos)) return false;
    }

    if (estac) {
      const e = Number(p.estacionamientos || p.numero_estacionamientos || 0);
      if (!e) return false;
      if (Math.round(e) < Number(estac)) return false;
    }

    if (filtrarTerreno) {
      const t = Number(p.m2_terreno || 0);
      if (!t) return false;
      if (t < terrenoMin || t > terrenoMax) return false;
    }

    if (filtrarConst) {
      const c = Number(p.m2_construccion || 0);
      if (!c) return false;
      if (c < constMin || c > constMax) return false;
    }

    return true;
  });

  currentPage = 1;
  renderPage();
}

function limpiar() {
  document.getElementById('f-ubicacion').value       = '';
  document.getElementById('f-precio').value          = '';
  document.getElementById('f-tipo').value            = '';
  document.getElementById('f-operacion').value       = '';
  document.getElementById('f-cuartos').value         = '';
  document.getElementById('f-banos').value           = '';
  document.getElementById('f-estacionamientos').value= '';
  document.getElementById('f-terreno-min').value     = '';
  document.getElementById('f-terreno-max').value     = '';
  document.getElementById('f-const-min').value       = '';
  document.getElementById('f-const-max').value       = '';

  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  filtered    = [...allProps];
  currentPage = 1;
  renderPage();
}

function toggleFiltrosExtra() {
  const panel = document.getElementById('filtros-extra');
  const btn   = document.getElementById('btn-mas-filtros');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
}

function selectChip(el, groupId, hiddenId) {

  const wasSelected = el.classList.contains('selected');
  document.querySelectorAll(`#${groupId} .chip`).forEach(c => c.classList.remove('selected'));
  if (!wasSelected) {
    el.classList.add('selected');
    document.getElementById(hiddenId).value = el.dataset.val;
  } else {
    document.getElementById(hiddenId).value = '';
  }
}


async function init() {
  document.getElementById('results-count').textContent = 'Cargando propiedades...';
  try {
    const res  = await fetch(`${API_BASE}/propiedades`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    let props  = Array.isArray(data) ? data : data.data || [];

    if (data.raw?.data?.prop_data) {
      const rawMap = {};
      data.raw.data.prop_data.forEach(r => {
        rawMap[r.propiedad_id] = { operacion: r.operacion, propuesta: 'propuesta' in r ? r.propuesta : undefined };
      });
      props = props.map(p => {
        const raw = rawMap[p.propiedad_id] || rawMap[p.id] || {};
        return { ...p, operacion: p.operacion || raw.operacion || '1', propuesta: 'propuesta' in raw ? raw.propuesta : p.propuesta };
      });
    }

    allProps = props;
    filtered = [...allProps];


    const params  = new URLSearchParams(window.location.search);
    const credito = params.get('credito');
    const maxP    = params.get('maxPrecio');
    const op      = params.get('operacion');


    const creditoToSelect = { bancario: '3+', fovissste: '2-3', infonavit: '1-2' };

    if (credito && creditoToSelect[credito]) {
      document.getElementById('f-precio').value = creditoToSelect[credito];
    }
    if (maxP) {
      filtered = filtered.filter(p => Number(p.precio||0) <= Number(maxP));
    }
    if (op) {
      document.getElementById('f-operacion').value = op;
      filtered = filtered.filter(p => String(p.operacion) === op);
    }

    if (credito) {
      const nombres = { bancario:'Crédito Bancario', fovissste:'FOVISSSTE', infonavit:'INFONAVIT' };
      const titleEl = document.querySelector('.results-count');
      if (titleEl) titleEl.dataset.credito = nombres[credito] || '';
    }

    renderPage();
  } catch(e) {
    console.error(e);
    document.getElementById('results-count').textContent = `Error al cargar: ${e.message}`;
  }
}

document.addEventListener('DOMContentLoaded', init);
</script>

<script>

  (function() {
    var toggle = document.getElementById('menu-toggle');
    var menu   = document.getElementById('nav-menu');
    if (toggle && menu) {
      toggle.addEventListener('click', function() { menu.classList.toggle('active'); });
    }
    document.querySelectorAll('.menu-item').forEach(function(item) {
      item.addEventListener('click', function(e) {
        if (window.innerWidth <= 768) {
          item.classList.toggle('open');
          e.stopPropagation();
        }
      });
    });

    document.addEventListener('click', function(e) {
      if (menu && !menu.contains(e.target) && toggle && !toggle.contains(e.target)) {
        menu.classList.remove('active');
      }
    });
  })();
</script>
